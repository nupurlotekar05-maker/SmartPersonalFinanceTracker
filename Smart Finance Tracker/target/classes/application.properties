# ========================
# DATABASE CONFIGURATION
# ========================
spring.datasource.url=jdbc:mysql://localhost:3306/finance_tracker3?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ========================
# JWT CONFIGURATION
# ========================
app.jwt.secret=YourSuperSecretKeyThatIsAtLeast256BitsLongForHS256Algorithm1234567890
app.jwt.expiration=86400000

# ========================
# SERVER
# ========================
server.port=8080

# ========================
# FILE UPLOAD
# ========================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=uploads/

# ========================
# GEMINI AI API (FREE - get key from https://aistudio.google.com/app/apikey)
# REPLACE THE VALUE BELOW WITH YOUR ACTUAL KEY
# ========================
# GEMINI AI API (Use gemini-2.0-flash with v1 endpoint)
gemini.api.key=AIzaSyAc7rWoNYsZDz49KWcUdaGAtDcUqrvynV4
# ========================
# OCR CONFIGURATION (Now powered by Gemini AI Vision)
# No local installation required.
# ========================

# ========================
# MAIL (Password Reset / Notifications)
# ========================
# REQUIRED: Replace with your Gmail address and App Password
# To get an App Password: Google Account → Security → 2-Step Verification → App passwords
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=YOUR_GMAIL@gmail.com
spring.mail.password=YOUR_16_CHAR_APP_PASSWORD
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ========================
# FRONTEND URL (for reset-password link in emails)
# ========================
app.frontend.url=http://localhost:3000

# ========================
# LOGGING
# ========================
logging.level.com.finance.tracker=DEBUG
